services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neoqueue_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neoqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neoqueue}
      POSTGRES_DB: ${POSTGRES_DB:-neoqueue}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neoqueue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neoqueue_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: neoqueue_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neoqueue}:${POSTGRES_PASSWORD:-neoqueue}@postgres:5432/${POSTGRES_DB:-neoqueue}
      REDIS_URL: redis://redis:6379/0
      ENV: ${ENV:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Worker ───────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neoqueue}:${POSTGRES_PASSWORD:-neoqueue}@postgres:5432/${POSTGRES_DB:-neoqueue}
      REDIS_URL: redis://redis:6379/0
      WORKER_HEARTBEAT_INTERVAL: ${WORKER_HEARTBEAT_INTERVAL:-10}
      WORKER_JOB_TIMEOUT: ${WORKER_JOB_TIMEOUT:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

  # ─── Watchdog ─────────────────────────────────────────────────────────────────
  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: neoqueue_watchdog
    restart: unless-stopped
    command: ["python", "-m", "worker.watchdog"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neoqueue}:${POSTGRES_PASSWORD:-neoqueue}@postgres:5432/${POSTGRES_DB:-neoqueue}
      REDIS_URL: redis://redis:6379/0
      WATCHDOG_POLL_INTERVAL: ${WATCHDOG_POLL_INTERVAL:-30}
      WORKER_JOB_TIMEOUT: ${WORKER_JOB_TIMEOUT:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── React Dashboard ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: neoqueue_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data: